<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم | Room Alone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; }
        .order-card { background: #0a0a0a; border-right: 4px solid #C5A059; }
    </style>
</head>
<body class="p-8">
    <div id="login" class="max-w-md mx-auto mt-20 p-8 border border-zinc-800 rounded-3xl bg-zinc-900">
        <h2 class="text-2xl font-bold text-[#C5A059] mb-6">دخول الإدارة</h2>
        <input id="email" type="text" placeholder="البريد" class="w-full p-4 mb-4 bg-black rounded-xl border border-zinc-800">
        <input id="pass" type="password" placeholder="كلمة السر" class="w-full p-4 mb-6 bg-black rounded-xl border border-zinc-800">
        <button onclick="check()" class="w-full bg-[#C5A059] text-black py-4 rounded-xl font-bold">دخول</button>
    </div>

    <div id="dashboard" class="hidden max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold text-[#C5A059] mb-10 flex justify-between items-center">
            الطلبات الحالية
            <span class="text-sm text-green-500 animate-pulse">متصل لايف</span>
        </h1>
        <div id="list" class="space-y-4">
            </div>
    </div>

    <script>
        const socket = io("https://node24.lunes.host:3488", { transports: ['websocket'] });

        function check() {
            if(document.getElementById('email').value === 'tests@test.test' && document.getElementById('pass').value === 'test123') {
                document.getElementById('login').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
            } else { alert('غلط!'); }
        }

        socket.on('new_order_to_admin', (data) => {
            const list = document.getElementById('list');
            const div = document.createElement('div');
            div.className = "order-card p-6 flex justify-between items-center rounded-xl animate__animated animate__slideInRight";
            div.innerHTML = `
                <div>
                    <h3 class="text-xl font-bold">${data.item}</h3>
                    <p class="text-gray-500 text-sm">طاولة: ${data.table} | ${data.time}</p>
                </div>
                <button onclick="this.parentElement.remove()" class="bg-zinc-800 px-6 py-2 rounded-lg text-sm">تم</button>
            `;
            list.prepend(div);
            new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3').play();
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم - Room Alone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-black text-white">
    <div id="login-section" class="h-screen flex items-center justify-center p-6">
        <div class="bg-zinc-900 p-8 rounded-2xl border border-[#C5A059]/30 w-full max-w-md">
            <h2 class="text-2xl font-bold text-[#C5A059] mb-8 text-center">إدارة الغرف والطلبات</h2>
            <input id="adm-email" type="email" placeholder="البريد الإلكتروني" class="w-full bg-black border border-white/10 p-4 mb-4 rounded-xl outline-none focus:border-[#C5A059]">
            <input id="adm-pass" type="password" placeholder="كلمة السر" class="w-full bg-black border border-white/10 p-4 mb-8 rounded-xl outline-none focus:border-[#C5A059]">
            <button onclick="loginAdmin()" class="w-full bg-[#C5A059] text-black font-bold py-4 rounded-xl shadow-lg hover:bg-white transition">دخول النظام</button>
        </div>
    </div>

    <div id="admin-panel" class="hidden container mx-auto px-6 py-12">
        <div class="flex justify-between items-center mb-12">
            <h1 class="text-3xl font-bold text-[#C5A059]">الطلبات الحالية</h1>
            <div class="flex items-center gap-2">
                <div class="w-3 h-3 bg-green-500 rounded-full animate-pulse"></div>
                <span class="text-sm opacity-50">متصل بالسيرفر لايف</span>
            </div>
        </div>
        <div id="admin-orders-list" class="max-w-3xl mx-auto">
            </div>
    </div>

    <script>
        function loginAdmin() {
            const email = document.getElementById('adm-email').value;
            const pass = document.getElementById('adm-pass').value;
            if(email === "tests@test.test" && pass === "test123") {
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('admin-panel').classList.remove('hidden');
                // بدء استقبال السوكيت
                initAdminPanel();
            } else {
                alert("بيانات الدخول غير صحيحة");
            }
        }
    </script>
    <script src="js/app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Room Alone | Exclusive Lounge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #C5A059; --dark: #050505; }
        body { background-color: var(--dark); color: white; font-family: 'Cairo', sans-serif; overflow-x: hidden; }
        .gold-border { border: 1px solid rgba(197, 160, 89, 0.3); }
        .gold-text { color: var(--gold); }
        .gold-bg { background-color: var(--gold); }
        .hero-gradient { background: radial-gradient(circle at center, rgba(197,160,89,0.15) 0%, transparent 70%); }
    </style>
</head>
<body>
    <nav class="fixed w-full z-50 px-8 py-6 flex justify-between items-center backdrop-blur-md border-b border-white/5">
        <div class="text-2xl font-bold tracking-widest gold-text">ROOM ALONE</div>
        <div class="space-x-8 space-x-reverse hidden md:flex">
            <a href="index.html" class="hover:text-[#C5A059] transition">الرئيسية</a>
            <a href="menu.html" class="hover:text-[#C5A059] transition">المنيو</a>
            <a href="admin.html" class="text-gray-500 hover:text-white transition">الإدارة</a>
        </div>
    </nav>

    <section class="h-screen flex items-center justify-center relative hero-gradient">
        <div class="text-center animate__animated animate__fadeInUp">
            <div class="mb-6 flex justify-center">
                <div class="w-32 h-32 border-2 border-[#C5A059] rounded-full flex items-center justify-center text-[#C5A059] text-4xl font-bold">RA</div>
            </div>
            <h1 class="text-6xl md:text-8xl font-bold mb-4 tracking-tighter uppercase">Room Alone</h1>
            <p class="text-[#C5A059] text-xl md:text-2xl tracking-[0.5em] mb-10 opacity-80">PREMIUM LOUNGE</p>
            <div class="flex gap-4 justify-center">
                <a href="#booking" class="gold-bg text-black px-10 py-3 rounded-full font-bold hover:scale-105 transition shadow-[0_0_30px_rgba(197,160,89,0.4)]">احجز مكانك</a>
                <a href="menu.html" class="border border-[#C5A059] text-[#C5A059] px-10 py-3 rounded-full font-bold hover:bg-[#C5A059] hover:text-black transition">اطلب الآن</a>
            </div>
        </div>
    </section>

    <section id="booking" class="py-32 px-6">
        <div class="max-w-6xl mx-auto text-center">
            <h2 class="text-4xl font-bold mb-16 gold-text">اختر نوع الحجز</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                <div class="bg-[#111] p-10 rounded-3xl gold-border hover:border-[#C5A059] transition-all group cursor-pointer">
                    <h3 class="text-2xl font-bold mb-4 group-hover:text-[#C5A059]">PS5 Zone</h3>
                    <p class="text-gray-400 mb-8">أحدث أجهزة البلايستيشن مع شاشات 4K</p>
                    <button class="w-full py-3 rounded-xl border border-white/10 hover:bg-white hover:text-black transition">احجز 50 EGP/hr</button>
                </div>
                <div class="bg-[#111] p-10 rounded-3xl gold-border hover:border-[#C5A059] transition-all group cursor-pointer">
                    <h3 class="text-2xl font-bold mb-4 group-hover:text-[#C5A059]">Private Room</h3>
                    <p class="text-gray-400 mb-8">غرف خاصة لنتفليكس والسينما بخصوصية تامة</p>
                    <button class="w-full py-3 rounded-xl border border-white/10 hover:bg-white hover:text-black transition">احجز 120 EGP/hr</button>
                </div>
                <div class="bg-[#111] p-10 rounded-3xl gold-border hover:border-[#C5A059] transition-all group cursor-pointer">
                    <h3 class="text-2xl font-bold mb-4 group-hover:text-[#C5A059]">Social Lounge</h3>
                    <p class="text-gray-400 mb-8">مكان هادي للقهوة والشغل مع أصحابك</p>
                    <button class="w-full py-3 rounded-xl border border-white/10 hover:bg-white hover:text-black transition">احجز طاولة</button>
                </div>
            </div>
        </div>
    </section>
</body>
</html>

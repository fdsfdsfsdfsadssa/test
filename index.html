<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Room Alone | Premium Lounge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        body { background: #050505; color: #fff; font-family: 'Segoe UI', Tahoma, sans-serif; }
        .gold-grad { background: linear-gradient(135deg, #C5A059 0%, #F9E4B7 50%, #C5A059 100%); }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(197, 160, 89, 0.2); }
        .hero-glow { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 400px; height: 400px; background: rgba(197, 160, 89, 0.1); filter: blur(100px); border-radius: 50%; z-index: -1; }
    </style>
</head>
<body class="overflow-x-hidden">
    <div class="hero-glow"></div>

    <nav class="p-6 flex justify-between items-center sticky top-0 z-50 glass m-4 rounded-2xl">
        <h1 class="text-2xl font-black tracking-tighter text-[#C5A059]">ROOM <span class="text-white">ALONE</span></h1>
        <div class="flex gap-4">
            <a href="admin.html" class="text-xs opacity-40 hover:opacity-100 transition mt-2">لوحة الإدارة</a>
        </div>
    </nav>

    <section class="text-center py-20 px-6">
        <h2 class="text-6xl font-bold mb-4 animate__animated animate__fadeInDown">استمتع بالرفاهية</h2>
        <p class="text-gray-400 max-w-lg mx-auto mb-10">اطلب مشروبك المفضل بلمسة واحدة وأنت في مكانك.</p>
    </section>

    <div class="container mx-auto px-6 pb-20">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="menu-grid">
            </div>
    </div>

    <script>
        const SERVER_URL = "https://node24.lunes.host:3488";
        const socket = io(SERVER_URL, { transports: ['websocket'] });

        const MENU = [
            { name: "اسبريسو سبيشال", price: 45, icon: "☕" },
            { name: "سبانش لاتيه بارد", price: 80, icon: "❄️" },
            { name: "موهيتو بلو لاجون", price: 75, icon: "🍹" },
            { name: "ناشوز بالجبنة", price: 60, icon: "🧀" }
        ];

        const grid = document.getElementById('menu-grid');
        MENU.forEach(item => {
            grid.innerHTML += `
                <div class="glass p-8 rounded-3xl hover:scale-105 transition-all duration-500 group">
                    <div class="text-4xl mb-4">${item.icon}</div>
                    <h3 class="text-xl font-bold mb-2">${item.name}</h3>
                    <div class="flex justify-between items-center mt-6">
                        <span class="text-[#C5A059] font-bold text-lg">${item.price} EGP</span>
                        <button onclick="order('${item.name}')" class="gold-grad text-black px-6 py-2 rounded-xl font-bold hover:shadow-[0_0_20px_rgba(197,160,89,0.5)] transition">طلب</button>
                    </div>
                </div>
            `;
        });

        function order(name) {
            const room = prompt("رقم الغرفة / الجهاز؟");
            if(!room) return;
            socket.emit('send_order', { item: name, table: room, time: new Date().toLocaleTimeString('ar-EG') });
            alert("✅ وصل الطلب يا هندسة جاري التجهيز!");
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الحجز — Room Alone</title>
<link rel="icon" type="image/png" href="assets/logo.png">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="navbar-placeholder"></div>

<div class="page-wrapper">
  <div class="container booking-section">

    <div class="section-header animate-on-scroll">
      <span class="section-tag">الحجز</span>
      <h1 class="section-title">احجز مكانك</h1>
      <div class="section-divider"></div>
    </div>

    <!-- Type selector -->
    <div class="menu-tabs animate-on-scroll">
      <button class="menu-tab active" onclick="setType('ps',   this)">🎮 بلاي ستيشن</button>
      <button class="menu-tab"        onclick="setType('room', this)">📺 روم نتفليكس</button>
    </div>

    <div class="booking-grid">
      <!-- Left: form -->
      <div>

        <!-- Device selection -->
        <div class="animate-on-scroll mb-24">
          <p class="form-label mb-16">اختار الجهاز / الروم</p>
          <div class="device-grid" id="deviceGrid"></div>
        </div>

        <!-- Time slots -->
        <div class="animate-on-scroll mb-24" style="transition-delay:.1s">
          <p class="form-label mb-16">اختار وقت البداية</p>
          <div class="time-grid" id="timeGrid"></div>
        </div>

        <!-- Duration -->
        <div class="animate-on-scroll mb-24" style="transition-delay:.15s">
          <div class="form-group">
            <label class="form-label">المدة</label>
            <select class="form-select" id="durSelect" onchange="updateSummary()">
              <option value="1">ساعة</option>
              <option value="2">ساعتين</option>
              <option value="3">3 ساعات</option>
              <option value="4">4 ساعات</option>
            </select>
          </div>
        </div>

        <!-- Customer info -->
        <div class="animate-on-scroll" style="transition-delay:.2s">
          <h3 style="font-family:'Playfair Display',serif;color:var(--gold-lt);margin-bottom:18px;">بياناتك</h3>
          <div class="form-group">
            <label class="form-label">الاسم</label>
            <input type="text" class="form-input" id="custName" placeholder="اسمك" oninput="updateSummary()">
          </div>
          <div class="form-group">
            <label class="form-label">رقم الموبايل</label>
            <input type="tel" class="form-input" id="custPhone" placeholder="01xxxxxxxxx" dir="ltr">
          </div>
          <div class="form-group">
            <label class="form-label">ملاحظات (اختياري)</label>
            <textarea class="cart-note" id="custNote" placeholder="أي طلبات خاصة..."></textarea>
          </div>
          <div id="bookingAlert"></div>
          <button class="btn btn-gold btn-full" onclick="submitBooking()">✅ تأكيد الحجز</button>
        </div>

      </div>

      <!-- Right: summary -->
      <div>
        <div class="booking-summary animate-on-scroll">
          <h3 style="font-family:'Playfair Display',serif;color:var(--gold-lt);margin-bottom:16px;">ملخص الحجز</h3>
          <div class="summary-row"><span class="summary-label">النوع</span>      <span class="summary-val" id="sumType">—</span></div>
          <div class="summary-row"><span class="summary-label">الجهاز</span>     <span class="summary-val" id="sumDevice">—</span></div>
          <div class="summary-row"><span class="summary-label">الوقت</span>      <span class="summary-val" id="sumTime">—</span></div>
          <div class="summary-row"><span class="summary-label">المدة</span>      <span class="summary-val" id="sumDur">—</span></div>
          <div class="summary-row"><span class="summary-label">الاسم</span>      <span class="summary-val" id="sumName">—</span></div>
          <div class="gold-line"></div>
          <div style="text-align:center">
            <p style="color:var(--text-muted);font-size:.78rem;line-height:1.7;">الحجز مجاني — بيتأكد من الأدمن<br>هنتواصل معاك على موبايلك</p>
          </div>
        </div>
      </div>

    </div>

    <!-- Confirm screen (hidden) -->
    <div id="bookingConfirm" class="order-confirm hidden">
      <div class="confirm-card">
        <div class="confirm-anim">🎉</div>
        <h2 style="font-family:'Playfair Display',serif;color:var(--gold-lt);margin:20px 0 8px;">تم الحجز!</h2>
        <p style="color:var(--text-muted);margin-bottom:28px;">طلب الحجز وصل للأدمن — هيتواصل معاك لتأكيد الموعد</p>
        <a href="index.html" class="btn btn-outline">🏠 الصفحة الرئيسية</a>
      </div>
    </div>

  </div>
</div>

<footer class="footer">
  <img src="assets/logo.png" alt="Room Alone" class="footer-logo">
  <p class="footer-text">© 2024 Room Alone</p>
</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.6.0/socket.io.min.js"></script>
<script src="js/config.js"></script>
<script src="js/app.js"></script>
<script src="js/booking.js"></script>
</body>
</html>
